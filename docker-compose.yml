# ─────────────────────────────────────────────────────────────────────────────
# Sports Event Scheduler — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Copy .env.example to .env, fill in your credentials, then run:
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports_scheduler
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist CSV output and log file on the host across container restarts.
      # The touch commands below ensure the files exist before Docker tries to bind-mount them.
      - ./events_data.csv:/app/events_data.csv
      - ./scheduler.log:/app/scheduler.log
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Needed so the container can reach the SSH SOCKS5 proxy at 127.0.0.1:1080
    # on the host. Remove this line if you're using an external proxy URL instead.
    network_mode: host
