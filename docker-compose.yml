# ─────────────────────────────────────────────────────────────────────────────
# Sports Event Scheduler — Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Copy .env.example to .env, fill in your credentials, then run:
#   docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sports_scheduler
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist log file on the host across container restarts
      - ./scheduler.log:/app/scheduler.log
      # Service account key — mounted read-only, never baked into the image
      - ./service_account.json:/app/service_account.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Needed so the container can reach the SSH SOCKS5 proxy at 127.0.0.1:1080
    # on the host. Remove this line if you're using an external proxy URL instead.
    network_mode: host
